<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">

  <defs>
    <!-- Fundo -->
    <radialGradient id="bg" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffd9df"></stop>
      <stop offset="100%" stop-color="#e8899f"></stop>
    </radialGradient>

    <!-- Ouro -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8cc"></stop>
      <stop offset="50%" stop-color="#d4af37"></stop>
      <stop offset="100%" stop-color="#6e5200"></stop>
    </linearGradient>

    <!-- Brilho -->
    <radialGradient id="shine" cx="30%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </radialGradient>

    <!-- Sombra -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.3"></feDropShadow>
    </filter>

  </defs>

  <!-- Fundo -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" filter="url(#shadow)"></circle>

  <!-- ORNAMENTOS -->
  <g stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.5">
    
    <!-- canto superior -->
    <path d="M128 30 C140 40, 150 50, 160 60"></path>
    <circle cx="160" cy="60" r="2"></circle>

    <!-- canto esquerdo -->
    <path d="M40 120 C60 110, 70 100, 80 90"></path>
    <circle cx="80" cy="90" r="2"></circle>

    <!-- canto direito -->
    <path d="M216 120 C196 110, 186 100, 176 90"></path>
    <circle cx="176" cy="90" r="2"></circle>

    <!-- inferior -->
    <path d="M128 226 C120 210, 110 200, 100 190"></path>
    <circle cx="100" cy="190" r="2"></circle>

  </g>

  <!-- Borda -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="url(#gold)" stroke-width="14"></circle>

  <circle cx="128" cy="128" r="100" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.7"></circle>

  <!-- Reflexo -->
  <ellipse cx="110" cy="85" rx="75" ry="35" fill="white" opacity="0.12"></ellipse>

  <!-- Brilho -->
  <circle cx="85" cy="75" r="30" fill="url(#shine)"></circle>

  <!-- Letra -->
  <text x="128" y="165" text-anchor="middle" font-size="140" font-family="Great Vibes, serif" fill="#ffffff" stroke="url(#gold)" stroke-width="3" filter="url(#shadow)">
    S
  </text>

</svg>